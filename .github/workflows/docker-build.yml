name: Build and Push Image

on:
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Image
        run: |
          docker build \
            -t shukratolaitan/tasktracker-backend:${{ github.sha }} \
            -t shukratolaitan/tasktracker-backend:latest \
            ./backend

      - name: Push Image
        run: |
          docker push shukratolaitan/tasktracker-backend:${{ github.sha }}
          docker push shukratolaitan/tasktracker-backend:latest
