name: Build and Push Image

on:
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Image
        run: |
          docker build \
            -t shukratolaitan/tasktracker-backend:${{ github.sha }} \
            -t shukratolaitan/tasktracker-backend:latest \
            ./backend

      - name: Push Image
        run: |
          docker push shukratolaitan/tasktracker-backend:${{ github.sha }}
          docker push shukratolaitan/tasktracker-backend:latest

      - name: Update Kubernetes Manifest
        run: |
          sed -i 's|image: .*|image: shukratolaitan/tasktracker-backend:'"${GITHUB_SHA}"'|' kubernetes/base/backend-deployment.yaml

      - name: Commit Manifest Change
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add kubernetes/base/backend-deployment.yaml

          git diff --staged --quiet || \
          git commit -m "ci: update image to ${GITHUB_SHA}"

      - name: Push Manifest Change
        run: |
          git push
