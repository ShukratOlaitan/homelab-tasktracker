services:

  db:
    image: postgres:16
    container_name: tasktracker-db

    environment:
      POSTGRES_DB: tasktracker
      POSTGRES_USER: taskuser
      POSTGRES_PASSWORD: taskpass

    ports:
      - "5432:5432"

    volumes:
      - tasktracker-db-data:/var/lib/postgresql/data

  backend:
    build: ./backend

    container_name: tasktracker-api

    environment:
      DATABASE_URL: postgresql://taskuser:taskpass@db:5432/tasktracker

    ports:
      - "8000:8000"

    depends_on:
      - db

volumes:
  tasktracker-db-data:
